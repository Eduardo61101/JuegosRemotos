<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Control Remoto Táctil</title>
    <!-- Librería Conector PeerJS -->
    <script src="https://unpkg.com"></script>
    <style>
        body { 
            text-align: center; 
            font-family: 'Arial', sans-serif; 
            background: #141414; 
            color: white; 
            margin: 0; 
            padding: 0;
            overflow: hidden; /* Evita que la pantalla se mueva por error al jugar */
            user-select: none;
            -webkit-user-select: none;
        }
        h2 { margin-top: 30px; font-size: 20px; color: #aaa; }
        #estado { font-weight: bold; color: #ffc107; margin-bottom: 20px; }

        /* Contenedor de la cruceta de botones */
        .control-pad {
            display: grid;
            grid-template-columns: repeat(3, 90px);
            grid-template-rows: repeat(3, 90px);
            gap: 15px;
            justify-content: center;
            align-content: center;
            margin-top: 40px;
        }

        /* Estilo general de los botones */
        .btn {
            background: #222;
            color: white;
            border: 3px solid #333;
            border-radius: 15px;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 10px rgba(0,0,0,0.4);
            cursor: pointer;
        }

        /* Efecto visual al presionar */
        .btn:active {
            background: #E50914; /* Rojo Netflix */
            border-color: #ff4d4d;
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(0,0,0,0.6);
        }

        /* Posiciones específicas en la cuadrícula */
        .btn-arriba    { grid-column: 2; grid-row: 1; }
        .btn-izquierda { grid-column: 1; grid-row: 2; }
        .btn-derecha   { grid-column: 3; grid-row: 2; }
        .btn-abajo     { grid-column: 2; grid-row: 3; }
        .vacio         { grid-column: 2; grid-row: 2; background: transparent; border: none; box-shadow: none; pointer-events: none; }
    </style>
</head>
<body>

    <h2>Mando de Juego</h2>
    <div id="estado">Conectando con la pantalla...</div>

    <!-- Panel de control direccional -->
    <div class="control-pad">
        <button class="btn btn-arriba" id="ARRIBA">▲</button>
        <button class="btn btn-izquierda" id="IZQUIERDA">◀</button>
        <div class="vacio"></div> <!-- Centro vacío de la cruceta -->
        <button class="btn btn-derecha" id="DERECHA">▶</button>
        <button class="btn btn-abajo" id="ABAJO">▼</button>
    </div>

    <script>
        // 1. LEER EL ID DE LA SALA DESDE LA URL GENERADA POR EL QR
        const urlParams = new URLSearchParams(window.location.search);
        const idSala = urlParams.get('sala');

        if (!idSala) {
            document.getElementById("estado").innerHTML = "Error: QR inválido o falta ID de sala.";
            document.getElementById("estado").style.color = "#ff4d4d";
        } else {
            // 2. INICIAR PEER EN EL CELULAR
            const peer = new Peer();

            peer.on('open', () => {
                // Conectarse a la pantalla usando el ID obtenido del QR
                const conexion = peer.connect(idSala);

                conexion.on('open', () => {
                    document.getElementById("estado").innerHTML = "¡Conectado con éxito! 🎮";
                    document.getElementById("estado").style.color = "#2ed573";

                    // 3. ACTIVAR LOS EVENTOS TÁCTILES PARA ENVIAR ÓRDENES
                    configurarBoton("ARRIBA", conexion);
                    configurarBoton("ABAJO", conexion);
                    configurarBoton("IZQUIERDA", conexion);
                    configurarBoton("DERECHA", conexion);
                });

                conexion.on('close', () => {
                    document.getElementById("estado").innerHTML = "Conexión perdida con la pantalla.";
                    document.getElementById("estado").style.color = "#ff4d4d";
                });
            });
        }

        // Función para que los botones envíen datos al tocarlos
        function configurarBoton(idComando, conexion) {
            const boton = document.getElementById(idComando);
            
            // Usamos 'touchstart' en lugar de 'click' para que responda al instante en celular
            boton.addEventListener("touchstart", (e) => {
                e.preventDefault(); // Evita zooms molestos del navegador
                
                // Hace vibrar el celular 30 milisegundos si es compatible
                if (navigator.vibrate) navigator.vibrate(30); 
                
                conexion.send(idComando); // Envía la dirección ("ARRIBA", "ABAJO", etc.)
            });
        }
    </script>
</body>
</html>
