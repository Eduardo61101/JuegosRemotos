<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mando a Distancia</title>
    <!-- Librerías de Firebase -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase.js"></script>

    <style>
        body { text-align: center; font-family: Arial, sans-serif; background: #141414; color: white; margin: 0; padding: 0; overflow: hidden; user-select: none; }
        h2 { margin-top: 20px; color: #aaa; font-size: 18px; }
        #estado { font-weight: bold; color: #2ed573; margin-bottom: 20px; }
        
        .cruceta {
            display: grid;
            grid-template-columns: repeat(3, 90px);
            grid-template-rows: repeat(3, 90px);
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        .btn {
            background: #222; color: white; border: 3px solid #333; border-radius: 15px;
            font-size: 28px; font-weight: bold; display: flex; align-items: center; justify-content: center;
        }
        .btn:active { background: #E50914; border-color: #ff4d4d; transform: scale(0.95); }
        .b-arriba { grid-column: 2; grid-row: 1; }
        .b-izq { grid-column: 1; grid-row: 2; }
        .b-der { grid-column: 3; grid-row: 2; }
        .b-abajo { grid-column: 2; grid-row: 3; }
    </style>
</head>
<body>

    <h2>Mando de Control</h2>
    <div id="estado">Sincronizado con la pantalla principal</div>

    <div class="cruceta">
        <button class="btn b-arriba" onclick="enviar('ARRIBA')">▲</button>
        <button class="btn b-izq" onclick="enviar('IZQUIERDA')">◀</button>
        <button class="btn b-der" onclick="enviar('DERECHA')">▶</button>
        <button class="btn b-abajo" onclick="enviar('ABAJO')">▼</button>
    </div>

    <script>
        // 1. CONFIGURACIÓN DE TU REALTIME DATABASE
        const firebaseConfig = {
            databaseURL: "https://juegosremotos-4f2f8-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. LEER EL ID DE LA SALA DESDE LA URL DEL QR
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('sala');

        // 3. ENVIAR EL BOTÓN PRESIONADO A FIREBASE
        function enviar(direccion) {
            if (sessionId) {
                db.ref("sesiones/" + sessionId).set({
                    accion: direccion,
                    timestamp: Date.now() // Forzar cambio en tiempo real
                });
            } else {
                document.getElementById("estado").innerHTML = "Error: Falta ID de sala en URL.";
                document.getElementById("estado").style.color = "#ff4d4d";
            }
        }
    </script>
</body>
</html>
