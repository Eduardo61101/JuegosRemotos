<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control de Juego - Estudio Sermiteop</title>
    <style>
        body {
            margin: 0;
            background: #0f1016;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        .contenedor {
            width: 90%;
            max-width: 400px;
            text-align: center;
            display: none;
        }
        .visible { display: block; }
        
        h2 { margin: 0 0 10px 0; color: #ffd32a; font-size: 24px; }
        .rol-alerta { font-size: 18px; font-weight: bold; margin-bottom: 20px; padding: 10px; border-radius: 6px; }
        .rol-inocente { background: #2ed573; color: white; }
        .rol-impostor { background: #ff4757; color: white; animation: pulso 1.5s infinite; }
        
        /* Botones dinámicos de Incisos y Votación */
        .cuadrilla-botones {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 15px;
        }
        .btn-opcion {
            background: #1e2030;
            color: white;
            border: 2px solid #3d425e;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-opcion:active { background: #e50914; border-color: #ff1f2a; }
        .btn-omitir { background: #333 !important; border-color: #555 !important; }
        
        .texto-espera { font-size: 18px; color: #8e9bb0; font-style: italic; }

        @keyframes pulso {
            0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 71, 87, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }
    </style>
</head>
<body>

    <div id="pantalla-lobby" class="contenedor visible">
        <h2 style="color: #E50914;">CONECTADO</h2>
        <p class="texto-espera" style="margin-top: 30px;">Esperando que el dueño de la sala inicie la partida en la TV...</p>
    </div>

    <div id="pantalla-pistas" class="contenedor">
        <div id="lbl-rol" class="rol-alerta">Cargando rol...</div>
        <div id="contenedor-palabra" style="font-size: 22px; margin-bottom: 20px; font-weight: bold;"></div>
        
        <div id="estado-turno-mensaje" class="texto-espera" style="color: #ffd32a; margin-bottom: 15px;">MIRA LA PANTALLA GRANDE...</div>
        
        <div id="botones-incisos" class="cuadrilla-botones">
            </div>
    </div>

    <div id="pantalla-votacion" class="contenedor">
        <h2 style="color: #ff4757;">¿QUIÉN ES EL IMPOSTOR?</h2>
        <p style="color: #aaa; margin: 0 0 15px 0;">¡Vota por el sospechoso o decide omitir!</p>
        
        <div id="botones-voto" class="cuadrilla-botones">
            </div>
    </div>

    <div id="pantalla-espera" class="contenedor">
        <h2>ACCIÓN REGISTRADA</h2>
        <p class="texto-espera" style="margin-top: 40px;">Tu respuesta fue enviada de forma segura.<br><br>¡Mira el tablero principal!</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // CONFIGURACIÓN DE TU CONFIG DE FIREBASE (Usa la misma de tu pantalla.html)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_AUTH_DOMAIN",
            databaseURL: "TU_DATABASE_URL",
            projectId: "TU_PROJECT_ID",
            storageBucket: "TU_STORAGE_BUCKET",
            messagingSenderId: "TU_MESSAGING_SENDER_ID",
            appId: "TU_APP_ID"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Identificadores únicos del control (ej: control.html?sala=SALA123&id=mando_99)
        const parametros = new URLSearchParams(window.location.search);
        const idSala = parametros.get("sala") || "sala_test";
        // Si no existe un ID de control en la URL, generamos uno único aleatorio para este celular
        let idControlador = parametros.get("id");
        if (!idControlador) {
            idControlador = "cel_" + Math.random().toString(36).substr(2, 9);
        }

        // Registrar presencia inicial en la rama de comandos para que el lobby del juego nos detecte
        db.ref(`sesiones/${idSala}/comandos`).push({
            accion: "CONEXION_CONTROL",
            idControlador: idControlador
        });

        // --- ESCUCHAR ACTUALIZACIONES DE NUESTRO JUGADOR DESDE LA PANTALLA GRANDE ---
        db.ref(`sesiones/${idSala}/jugadores/${idControlador}`).on("value", (snapshot) => {
            const datos = snapshot.val();
            if (!datos) {
                cambiarPantallaUI("pantalla-lobby");
                return;
            }

            // CASO 1: Fase de visualización de Palabra / Rol y Elección de Incisos
            if (datos.estadoPanel === "ELEGIR_PISTA") {
                cambiarPantallaUI("pantalla-pistas");
                
                const contenedorRol = document.getElementById("lbl-rol");
                const contenedorPalabra = document.getElementById("contenedor-palabra");
                const txtTurno = document.getElementById("estado-turno-mensaje");
                const divIncisos = document.getElementById("botones-incisos");

                // Configurar visualización según rol
                if (datos.rol === "IMPOSTOR") {
                    contenedorRol.innerText = "🕵️‍♂️ ERES EL IMPOSTOR";
                    contenedorRol.className = "rol-alerta rol-impostor";
                    contenedorPalabra.innerText = "¡No sabes la palabra! Miente.";
                } else {
                    contenedorRol.innerText = "📝 ERES INOCENTE";
                    contenedorRol.className = "rol-alerta rol-inocente";
                    contenedorPalabra.innerText = `PALABRA: ${datos.palabra}`;
                }

                // Bloquear o desbloquear botones según sea tu turno de hablar
                divIncisos.innerHTML = "";
                if (datos.miTurno === true) {
                    txtTurno.innerText = "💥 ¡ES TU TURNO! Elige un inciso:";
                    txtTurno.style.color = "#2ed573";
                    
                    // Renderizar las 4 opciones enviadas por el juego equilibradamente
                    datos.opciones.forEach(inciso => {
                        const boton = document.createElement("button");
                        boton.className = "btn-opcion";
                        boton.innerText = inciso;
                        boton.onclick = () => enviarIncisioElegido(inciso);
                        divIncisos.appendChild(boton);
                    });
                } else {
                    txtTurno.innerText = "Espera que los demás den sus pistas...";
                    txtTurno.style.color = "#8e9bb0";
                }
            }

            // CASO 2: Fase de Votación Abierta
            if (datos.estadoPanel === "VOTACION") {
                cambiarPantallaUI("pantalla-votacion");
                const divVotos = document.getElementById("botones-voto");
                divVotos.innerHTML = "";

                // Generar los botones de los jugadores vivos en la sala sacados de Firebase
                datos.opcionesVoto.forEach(target => {
                    const boton = document.createElement("button");
                    boton.className = "btn-opcion";
                    
                    // Impedir votar por uno mismo de forma limpia
                    if (target.id === idControlador) {
                        boton.innerText = `P${target.num} (Tú)`;
                        boton.disabled = true;
                        boton.style.opacity = "0.4";
                    } else {
                        boton.innerText = `Votar P${target.num}`;
                        boton.onclick = () => enviarVotoProcesado(target.id);
                    }
                    divVotos.appendChild(boton);
                });

                // Añadir el botón universal de Omitir Voto al final
                const btnOmitir = document.createElement("button");
                btnOmitir.className = "btn-opcion btn-omitir";
                btnOmitir.innerText = "🚫 Omitir Voto";
                btnOmitir.onclick = () => enviarVotoProcesado("OMITIR");
                divVotos.appendChild(btnOmitir);
            }
        });

        // --- EMISORES DE ACCIONES HACIA LA PANTALLA GRANDE ---
        function enviarIncisioElegido(textoInciso) {
            cambiarPantallaUI("pantalla-espera");
            
            // Quitar bandera de turno en Firebase de forma inmediata
            db.ref(`sesiones/${idSala}/jugadores/${idControlador}/miTurno`).set(false);

            // Enviar respuesta a la cola de comandos de Firebase para que el iframe la ejecute
            db.ref(`sesiones/${idSala}/comandos`).push({
                accion: "PISTA_SELECCIONADA",
                idControlador: idControlador,
                inciso: textoInciso
            });
        }

        function enviarVotoProcesado(idObjetivo) {
            cambiarPantallaUI("pantalla-espera");

            db.ref(`sesiones/${idSala}/comandos`).push({
                accion: "VOTO_PROCESADO",
                idControlador: idControlador,
                objetivo: idObjetivo
            });
        }

        function cambiarPantallaUI(idPantalla) {
            document.querySelectorAll(".contenedor").forEach(p => p.classList.remove("visible"));
            document.getElementById(idPantalla).classList.add("visible");
        }
    </script>
</body>
</html>
