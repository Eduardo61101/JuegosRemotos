<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Netflix Games - Control</title>

<!-- Firebase -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    font-family:Arial,Helvetica,sans-serif;
}

body{

    background:#141414;

    color:white;

    overflow:hidden;

    width:100vw;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

}

#control{

    width:100%;

    height:100%;

    display:flex;

    flex-direction:column;

    justify-content:space-between;

    padding:20px;

}






/*==============================

ENCABEZADO

==============================*/

header{

display:flex;

justify-content:space-between;

align-items:center;

}

#logo{

font-size:26px;

font-weight:bold;

color:#E50914;

letter-spacing:1px;

}

#estado{

font-size:15px;

color:#2ed573;

font-weight:bold;

}






/*==============================

ZONA CENTRAL

==============================*/

main{

flex:1;

display:flex;

justify-content:space-between;

align-items:center;

padding:20px 0;

}






/*==============================

JOYSTICK

==============================*/

#joystick{

width:190px;

height:190px;

background:#1d1d1d;

border-radius:50%;

position:relative;

border:3px solid #2b2b2b;

box-shadow:
0 0 25px rgba(0,0,0,.6);

}

#stick{

width:80px;

height:80px;

background:#E50914;

border-radius:50%;

position:absolute;

left:55px;

top:55px;

transition:.05s;

box-shadow:

0 0 20px rgba(229,9,20,.5);

}






/*==============================

BOTONES

==============================*/

#botones{

display:grid;

grid-template-columns:repeat(2,85px);

grid-template-rows:repeat(2,85px);

gap:18px;

}

.boton{

width:85px;

height:85px;

border:none;

border-radius:50%;

background:#252525;

color:white;

font-size:30px;

font-weight:bold;

cursor:pointer;

transition:.12s;

box-shadow:

0 6px 12px rgba(0,0,0,.4);

}

.boton:active{

transform:scale(.92);

}

#a{

background:#1abc9c;

}

#b{

background:#e74c3c;

}

#x{

background:#3498db;

}

#y{

background:#f1c40f;

color:black;

}





/*==============================

BARRA INFERIOR

==============================*/

footer{

display:flex;

justify-content:space-between;

align-items:center;

padding-top:10px;

}

.menuBtn{

width:90px;

height:45px;

background:#252525;

border:none;

border-radius:12px;

color:white;

font-size:15px;

font-weight:bold;

transition:.15s;

}

.menuBtn:active{

transform:scale(.94);

background:#E50914;

}

</style>

</head>

<body>

<div id="control">

<header>

<div id="logo">

NETFLIX GAMES

</div>

<div id="estado">

Conectando...

</div>

</header>

<main>

<div id="joystick">

<div id="stick"></div>

</div>

<div id="botones">

<button id="y" class="boton">Y</button>

<button id="x" class="boton">X</button>

<button id="b" class="boton">B</button>

<button id="a" class="boton">A</button>

</div>

</main>

<footer>

<button id="menu" class="menuBtn">

☰ MENÚ

</button>

<button id="inicio" class="menuBtn">

⌂ INICIO

</button>

<button id="pausa" class="menuBtn">

⏸ PAUSA

</button>

</footer>

<script>

//=====================================
// FIREBASE
//=====================================

const firebaseConfig = {

    databaseURL: "https://juegosremotos-4f2f8-default-rtdb.firebaseio.com/"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();




//=====================================
// LEER ID DE SALA
//=====================================

const params = new URLSearchParams(location.search);

const sessionId = params.get("sala");

const estado = document.getElementById("estado");

if(!sessionId){

    estado.innerHTML = "Sin sala";

    estado.style.color = "#ff5555";

    throw new Error("No existe el parámetro sala");

}

estado.innerHTML = "Conectado";




//=====================================
// VIBRACIÓN
//=====================================

function vibrar(ms=25){

    if(navigator.vibrate){

        navigator.vibrate(ms);

    }

}




//=====================================
// ENVIAR A FIREBASE
//=====================================

function enviar(accion,valor=null){

    db.ref("sesiones/"+sessionId).set({

        accion:accion,

        valor:valor,

        tiempo:Date.now()

    });

}




//=====================================
// BOTONES A B X Y
//=====================================

["a","b","x","y"].forEach(id=>{

    const boton=document.getElementById(id);

    boton.addEventListener("touchstart",()=>{

        vibrar();

        enviar(id.toUpperCase());

    });

    boton.addEventListener("mousedown",()=>{

        enviar(id.toUpperCase());

    });

});




//=====================================
// BOTONES MENU
//=====================================

document.getElementById("menu").onclick=()=>{

    vibrar();

    enviar("MENU");

};

document.getElementById("inicio").onclick=()=>{

    vibrar();

    enviar("HOME");

};

document.getElementById("pausa").onclick=()=>{

    vibrar();

    enviar("PAUSA");

};




//=====================================
// JOYSTICK
//=====================================

const joystick=document.getElementById("joystick");

const stick=document.getElementById("stick");

let centroX=95;

let centroY=95;

let radio=55;

let activo=false;

function moverStick(x,y){

    let dx=x-centroX;

    let dy=y-centroY;

    let distancia=Math.sqrt(dx*dx+dy*dy);

    if(distancia>radio){

        dx*=radio/distancia;

        dy*=radio/distancia;

    }

    stick.style.left=(55+dx)+"px";

    stick.style.top=(55+dy)+"px";

    if(Math.abs(dx)>Math.abs(dy)){

        if(dx>25){

            enviar("DERECHA");

        }

        else if(dx<-25){

            enviar("IZQUIERDA");

        }

    }

    else{

        if(dy>25){

            enviar("ABAJO");

        }

        else if(dy<-25){

            enviar("ARRIBA");

        }

    }

}

function resetStick(){

    stick.style.left="55px";

    stick.style.top="55px";

    enviar("CENTRO");

}

joystick.addEventListener("touchstart",(e)=>{

    activo=true;

    vibrar();

});

joystick.addEventListener("touchmove",(e)=>{

    if(!activo)return;

    const rect=joystick.getBoundingClientRect();

    moverStick(

        e.touches[0].clientX-rect.left,

        e.touches[0].clientY-rect.top

    );

});

joystick.addEventListener("touchend",()=>{

    activo=false;

    resetStick();

});




//=====================================
// SOPORTE PARA MOUSE
//=====================================

joystick.addEventListener("mousedown",(e)=>{

    activo=true;

});

document.addEventListener("mousemove",(e)=>{

    if(!activo)return;

    const rect=joystick.getBoundingClientRect();

    moverStick(

        e.clientX-rect.left,

        e.clientY-rect.top

    );

});

document.addEventListener("mouseup",()=>{

    if(!activo)return;

    activo=false;

    resetStick();

});





//=====================================
// EFECTOS VISUALES
//=====================================

document.querySelectorAll(".boton,.menuBtn").forEach((boton)=>{

    boton.addEventListener("touchstart",()=>{

        boton.style.boxShadow="0 0 25px #E50914";

    });

    boton.addEventListener("touchend",()=>{

        boton.style.boxShadow="0 6px 12px rgba(0,0,0,.4)";

    });

    boton.addEventListener("mousedown",()=>{

        boton.style.boxShadow="0 0 25px #E50914";

    });

    boton.addEventListener("mouseup",()=>{

        boton.style.boxShadow="0 6px 12px rgba(0,0,0,.4)";

    });

});




//=====================================
// ANIMACIÓN DEL ESTADO
//=====================================

let visible=true;

setInterval(()=>{

    estado.style.opacity=visible?"1":"0.5";

    visible=!visible;

},800);




//=====================================
// EVITAR ZOOM
//=====================================

document.addEventListener("gesturestart",(e)=>{

    e.preventDefault();

});

document.addEventListener("dblclick",(e)=>{

    e.preventDefault();

});




//=====================================
// BLOQUEAR MENÚ CONTEXTUAL
//=====================================

document.addEventListener("contextmenu",(e)=>{

    e.preventDefault();

});




//=====================================
// TECLADO PARA PRUEBAS EN PC
//=====================================

document.addEventListener("keydown",(e)=>{

    switch(e.key){

        case "ArrowUp":

            enviar("ARRIBA");

        break;

        case "ArrowDown":

            enviar("ABAJO");

        break;

        case "ArrowLeft":

            enviar("IZQUIERDA");

        break;

        case "ArrowRight":

            enviar("DERECHA");

        break;

        case "a":

        case "A":

            enviar("A");

        break;

        case "b":

        case "B":

            enviar("B");

        break;

        case "x":

        case "X":

            enviar("X");

        break;

        case "y":

        case "Y":

            enviar("Y");

        break;

        case "Escape":

            enviar("MENU");

        break;

        case "Enter":

            enviar("PAUSA");

        break;

    }

});




//=====================================
// MENSAJE DE BIENVENIDA
//=====================================

console.log("Netflix Games Controller iniciado correctamente.");

</script>

</body>
</html>
