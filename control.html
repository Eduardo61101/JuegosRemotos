<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control Universal - Estudio Sermiteop</title>
    <style>
        body {
            margin: 0;
            background: #0f1016;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        .contenedor {
            width: 90%;
            max-width: 420px;
            text-align: center;
            display: none;
        }
        .visible { display: block; }
        
        h2 { margin: 0 0 10px 0; color: #ffd32a; font-size: 24px; }
        .rol-alerta { font-size: 18px; font-weight: bold; margin-bottom: 20px; padding: 10px; border-radius: 6px; }
        .rol-inocente { background: #2ed573; color: white; }
        .rol-impostor { background: #ff4757; color: white; animation: pulso 1.5s infinite; }
        
        /* Botones del Impostor */
        .cuadrilla-botones {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
        }
        .btn-opcion {
            background: #1e2030;
            color: white;
            border: 2px solid #3d425e;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-opcion:active { background: #E50914; border-color: #ff1f2a; }
        .btn-omitir { background: #333 !important; border-color: #555 !important; }
        .texto-espera { font-size: 17px; color: #8e9bb0; font-style: italic; }

        /* --- DISEÑO DEL GAMEPAD CLÁSICO ORIGINAL --- */
        .gamepad-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        /* Cruceta Direccional */
        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 75px);
            grid-template-rows: repeat(3, 75px);
            gap: 5px;
        }
        .btn-dir {
            background: #222536;
            color: white;
            border: 3px solid #3d425e;
            border-radius: 10px;
            font-size: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
        }
        .btn-dir:active { background: #00d2d3; border-color: #00a8ff; }

        /* Botonera de Acción A, B, X, Y */
        .action-buttons {
            display: grid;
            grid-template-columns: repeat(3, 65px);
            grid-template-rows: repeat(3, 65px);
            gap: 8px;
        }
        .btn-act {
            color: white;
            font-weight: bold;
            font-size: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid rgba(0,0,0,0.3);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        .btn-act:active { transform: scale(0.9); filter: brightness(1.2); }
        
        /* Colores icónicos estilo consola */
        .btn-y { background: #ffca28; grid-column: 1; grid-row: 2; } /* Amarillo */
        .btn-x { background: #29b6f6; grid-column: 2; grid-row: 1; } /* Azul */
        .btn-b { background: #ef5350; grid-column: 3; grid-row: 2; } /* Rojo */
        .btn-a { background: #66bb6a; grid-column: 2; grid-row: 3; } /* Verde */

        @keyframes pulso {
            0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 71, 87, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }
    </style>
</head>
<body>

    <!-- LOBBY DE ESPERA (Impostor) -->
    <div id="pantalla-lobby" class="contenedor">
        <h2 style="color: #E50914;">SALA DE ESPERA</h2>
        <p class="texto-espera" style="margin-top: 30px;">Esperando que el dueño de la sala inicie la partida en la TV...</p>
    </div>

    <!-- SELECCIÓN DE PISTAS (Impostor) -->
    <div id="pantalla-pistas" class="contenedor">
        <div id="lbl-rol" class="rol-alerta">Cargando rol...</div>
        <div id="contenedor-palabra" style="font-size: 22px; margin-bottom: 20px; font-weight: bold;"></div>
        <div id="estado-turno-mensaje" class="texto-espera" style="color: #ffd32a; margin-bottom: 15px;">MIRA LA PANTALLA GRANDE...</div>
        <div id="botones-incisos" class="cuadrilla-botones"></div>
    </div>

    <!-- VOTACIÓN (Impostor) -->
    <div id="pantalla-votacion" class="contenedor">
        <h2 style="color: #ff4757;">¿QUIÊN ES EL IMPOSTOR?</h2>
        <p style="color: #aaa; margin: 0 0 15px 0;">¡Vota por el sospechoso u omite el voto!</p>
        <div id="botones-voto" class="cuadrilla-botones"></div>
    </div>

    <!-- PANTALLA TRADICIONAL RESTAURADA (Para Snake, Space Defender, etc.) -->
    <div id="pantalla-clasica" class="contenedor visible">
        <h2 style="color: #00d2d3; font-size: 20px; margin: 0;">ESTUDIO SERMITEOP</h2>
        
        <div class="gamepad-layout">
            <!-- D-PAD DIRECCIONAL -->
            <div class="d-pad">
                <div></div>
                <button class="btn-dir" onclick="enviarMando('ARRIBA')">⬆️</button>
                <div></div>
                <button class="btn-dir" onclick="enviarMando('IZQUIERDA')">⬅️</button>
                <div style="background: #191b28; border-radius: 8px;"></div>
                <button class="btn-dir" onclick="enviarMando('DERECHA')">➡️</button>
                <div></div>
                <button class="btn-dir" onclick="enviarMando('ABAJO')">⬇️</button>
                <div></div>
            </div>
            
            <!-- BOTONERA DE ACCIÓN A, B, X, Y ORIGINAL -->
            <div class="action-buttons">
                <button class="btn-act btn-x" onclick="enviarMando('X')">X</button>
                <button class="btn-act btn-y" onclick="enviarMando('Y')">Y</button>
                <button class="btn-act btn-b" onclick="enviarMando('B')">B</button>
                <button class="btn-act btn-a" onclick="enviarMando('A')">A</button>
            </div>
        </div>
    </div>

    <!-- PANTALLA DE ACCIÓN REGISTRADA -->
    <div id="pantalla-espera" class="contenedor">
        <h2>ACCIÓN ENVIADA</h2>
        <p class="texto-espera" style="margin-top: 40px;">Tu respuesta fue registrada de forma segura.<br><br>¡Mira el tablero principal!</p>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // CONFIGURACIÓN DE TU BASE DE DATOS DE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyD-Xgn8F9weuNtZ7ICMVMUBdch2S2DIx_I",
            authDomain: "juegosremotos-4f2f8.firebaseapp.com",
            databaseURL: "https://juegosremotos-4f2f8-default-rtdb.firebaseio.com",
            projectId: "juegosremotos-4f2f8",
            storageBucket: "juegosremotos-4f2f8.firebasestorage.app",
            messagingSenderId: "436753419918",
            appId: "1:436753419918:web:6d813e412a3e344fca43df"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const parametros = new URLSearchParams(window.location.search);
        const idSala = parametros.get("sala") || "sala_test";
        
        let idControlador = parametros.get("id");
        if (!idControlador) {
            idControlador = "cel_" + Math.random().toString(36).substr(2, 9);
        }

        // Registrar conexión inicial
        db.ref(`sesiones/${idSala}/comandos`).push({
            accion: "CONEXION_CONTROL",
            idControlador: idControlador
        });

        // --- MANEJO DE VISTAS (ESCUCHANDO A LA PANTALLA GRANDE) ---
        db.ref(`sesiones/${idSala}/jugadores/${idControlador}`).on("value", (snapshot) => {
            const datos = snapshot.val();
            
            // RESPALDO: Si no hay juego de roles activo, abre el Gamepad Clásico con A, B, X, Y
            if (!datos || !datos.estadoPanel) {
                cambiarPantallaUI("pantalla-clasica");
                return;
            }

            // IMPOSTOR - PISTAS
            if (datos.estadoPanel === "ELEGIR_PISTA") {
                cambiarPantallaUI("pantalla-pistas");
                
                const contenedorRol = document.getElementById("lbl-rol");
                const contenedorPalabra = document.getElementById("contenedor-palabra");
                const txtTurno = document.getElementById("estado-turno-mensaje");
                const divIncisos = document.getElementById("botones-incisos");

                if (datos.rol === "IMPOSTOR") {
                    contenedorRol.innerText = "🕵️‍♂️ ERES EL IMPOSTOR";
                    contenedorRol.className = "rol-alerta rol-impostor";
                    contenedorPalabra.innerText = "No sabes la palabra. ¡Engaña al grupo!";
                } else {
                    contenedorRol.innerText = "📝 ERES INOCENTE";
                    contenedorRol.className = "rol-alerta rol-inocente";
                    contenedorPalabra.innerText = `PALABRA: ${datos.palabra}`;
                }

                divIncisos.innerHTML = "";
                if (datos.miTurno === true) {
                    txtTurno.innerText = "💥 ¡ES TU TURNO! Elige tu inciso:";
                    txtTurno.style.color = "#2ed573";
                    
                    datos.opciones.forEach(inciso => {
                        const boton = document.createElement("button");
                        boton.className = "btn-opcion";
                        boton.innerText = inciso;
                        boton.onclick = () => enviarIncisoElegido(inciso);
                        divIncisos.appendChild(boton);
                    });
                } else {
                    txtTurno.innerText = "Espera tu turno mirando la pantalla grande...";
                    txtTurno.style.color = "#8e9bb0";
                }
            }

            // IMPOSTOR - VOTACIONES
            if (datos.estadoPanel === "VOTACION") {
                cambiarPantallaUI("pantalla-votacion");
                const divVotos = document.getElementById("botones-voto");
                divVotos.innerHTML = "";

                datos.opcionesVoto.forEach(target => {
                    const boton = document.createElement("button");
                    boton.className = "btn-opcion";
                    
                    if (target.id === idControlador) {
                        boton.innerText = `P${target.num} (Tú)`;
                        boton.disabled = true;
                        boton.style.opacity = "0.4";
                    } else {
                        boton.innerText = `Votar P${target.num}`;
                        boton.onclick = () => enviarVotoProcesado(target.id);
                    }
                    divVotos.appendChild(boton);
                });

                const btnOmitir = document.createElement("button");
                btnOmitir.className = "btn-opcion btn-omitir";
                btnOmitir.innerText = "🚫 Omitir Voto";
                btnOmitir.onclick = () => enviarVotoProcesado("OMITIR");
                divVotos.appendChild(btnOmitir);
            }
        });

        // --- SISTEMA DE EMISIÓN DE BOTONES RESTAURADO ---
        
        // Esta función envía los datos usando la estructura idDispositivo/comando que tus otros juegos leen perfectamente
        function enviarMando(botonPulsado) {
            db.ref(`sesiones/${idSala}/comandos`).push({
                idDispositivo: idControlador,
                idControlador: idControlador,
                comando: botonPulsado, // Envía 'ARRIBA', 'ABAJO', 'A', 'B', etc.
                accion: "BOTON_PULSADO" // Mantiene compatibilidad por si se busca un tipo de acción
            });
        }

        // Emisores dedicados del juego del impostor
        function enviarIncisoElegido(textoInciso) {
            cambiarPantallaUI("pantalla-espera");
            db.ref(`sesiones/${idSala}/jugadores/${idControlador}/miTurno`).set(false);
            db.ref(`sesiones/${idSala}/comandos`).push({
                accion: "PISTA_SELECCIONADA",
                idControlador: idControlador,
                inciso: textoInciso
            });
        }

        function enviarVotoProcesado(idObjetivo) {
            cambiarPantallaUI("pantalla-espera");
            db.ref(`sesiones/${idSala}/comandos`).push({
                accion: "VOTO_PROCESADO",
                idControlador: idControlador,
                objetivo: idObjetivo
            });
        }

        function cambiarPantallaUI(idPantalla) {
            document.querySelectorAll(".contenedor").forEach(p => p.classList.remove("visible"));
            document.getElementById(idPantalla).classList.add("visible");
        }
    </script>
</body>
</html>
