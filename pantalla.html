<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Netflix Games</title>

<!-- Firebase -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase.js"></script>

<style>

body{
    margin:0;
    background:#141414;
    color:white;
    font-family:Arial,Helvetica,sans-serif;
    text-align:center;
}

h1{
    color:#E50914;
}

#contenedor-qr{
    display:inline-block;
    background:white;
    padding:15px;
    border-radius:10px;
    margin-top:20px;
}

#contenedor-qr p{
    color:black;
    margin:0 0 10px;
    font-weight:bold;
}

#imagenQR{
    width:180px;
    height:180px;
}

#estado{
    margin:20px;
    color:#ffd54f;
    font-weight:bold;
}

iframe{
    width:900px;
    height:550px;
    border:none;
    border-radius:10px;
    background:black;
    margin-bottom:30px;
}

</style>

</head>
<body>

<h1>NETFLIX GAMES</h1>

<div id="contenedor-qr">
<p>Escanea con tu celular</p>
<img id="imagenQR">
</div>

<p id="estado">
Esperando control...
</p>

<iframe id="juego"></iframe>

<script>

//=============================
// FIREBASE
//=============================

const firebaseConfig={
    databaseURL:"https://juegosremotos-4f2f8-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

//=============================
// CREAR SALA
//=============================

const sessionId="sala_"+Math.random().toString(36).substring(2,10);

//=============================
// SABER QUÉ JUEGO ABRIR
//=============================

const parametros=new URLSearchParams(location.search);

const juego=parametros.get("juego") || "snake";

//=============================
// CARGAR EL JUEGO
//=============================

document.getElementById("juego").src="juegos/"+juego+".html?sala="+sessionId;

//=============================
// URL DEL CONTROL
//=============================

const controlURL=

location.origin+
location.pathname.replace("pantalla.html","control.html")+
"?sala="+sessionId;

//=============================
// GENERAR QR
//=============================

document.getElementById("imagenQR").src=

"https://api.qrserver.com/v1/create-qr-code/?size=250x250&data="+encodeURIComponent(controlURL);

//=============================
// ESCUCHAR FIREBASE
//=============================

db.ref("sesiones/"+sessionId).on("value",(snapshot)=>{

const datos=snapshot.val();

if(!datos)return;

document.getElementById("estado").innerHTML="Control conectado 🎮";

document.getElementById("estado").style.color="#2ed573";

//Enviar al juego

const iframe=document.getElementById("juego");

iframe.contentWindow.postMessage({

accion:datos.accion

},"*");

});

</script>

</body>
</html>
