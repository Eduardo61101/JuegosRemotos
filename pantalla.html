<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pantalla Principal - Estudio Sermiteop</title>
    <style>
        body {
            margin: 0;
            background: #050508;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
        }
        #contenedor-pantalla {
            position: relative;
            width: 850px;
            height: 580px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }
    </style>
</head>
<body>

    <div id="contenedor-pantalla">
        <iframe id="iframeJuego" src=""></iframe>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // CONFIGURACIÓN DE TU CONFIG DE FIREBASE (Reemplaza con tus datos reales)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_AUTH_DOMAIN",
            databaseURL: "TU_DATABASE_URL",
            projectId: "TU_PROJECT_ID",
            storageBucket: "TU_STORAGE_BUCKET",
            messagingSenderId: "TU_MESSAGING_SENDER_ID",
            appId: "TU_APP_ID"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Obtener la sala actual desde la URL (ejemplo: pantalla.html?sala=SALA123&juego=palabra_oculta)
        const parametros = new URLSearchParams(window.location.search);
        const idSala = parametros.get("sala") || "sala_test";
        const juegoSeleccionado = parametros.get("juego") || "palabra_oculta";

        const iframeJuego = document.getElementById("iframeJuego");
        
        // Cargar el juego correcto dentro del iframe
        iframeJuego.src = `juegos/${juegoSeleccionado}.html`;

        // --- 1. ESCUCHAR CONTROLES DESDE FIREBASE Y MANDARLOS AL IFRAME ---
        // Escucha la rama de "controles" o "comandos" dentro de tu estructura de Firebase
        db.ref(`sesiones/${idSala}/comandos`).on("child_added", (snapshot) => {
            const datosComando = snapshot.val();
            if (!datosComando) return;

            // Reenviar el comando del celular directamente hacia adentro del iframe del juego
            iframeJuego.contentWindow.postMessage(datosComando, "*");

            // Borrar el comando procesado para mantener Firebase limpio
            snapshot.ref.remove();
        });

        // --- 2. ESCUCHAR ORDENES DEL JUEGO (IFRAME) Y ESCRIBIRLAS EN FIREBASE ---
        window.addEventListener("message", (evento) => {
            const datosJuego = evento.data;
            if (!datosJuego || !datosJuego.accion) return;

            // Caso A: El juego le manda a la pantalla la configuración del celular de un jugador
            if (datosJuego.accion === "CONFIGURAR_CONTROL_JUEGO") {
                db.ref(`sesiones/${idSala}/jugadores/${datosJuego.idControlador}`).set({
                    numeroJugador: datosJuego.numeroJugador,
                    rol: datosJuego.datos.rol,
                    palabra: datosJuego.datos.palabra || "",
                    opciones: datosJuego.datos.opciones,
                    estadoPanel: "ELEGIR_PISTA" // Le avisa al celular que dibuje los incisos
                });
            }

            // Caso B: El juego avisa que es el turno específico de un celular
            if (datosJuego.accion === "ACTIVAR_TURNO_CELULAR") {
                db.ref(`sesiones/${idSala}/jugadores/${datosJuego.idControlador}/miTurno`).set(true);
            }

            // Caso C: El juego abre las votaciones y manda la lista de sobrevivientes a los celulares
            if (datosJuego.accion === "MOSTRAR_BOTONES_VOTO_CELULAR") {
                db.ref(`sesiones/${idSala}/jugadores/${datosJuego.idControlador}`).update({
                    estadoPanel: "VOTACION",
                    opcionesVoto: datosJuego.opcionesVoto
                });
            }
        });
    </script>
</body>
</html>
