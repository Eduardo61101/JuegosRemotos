<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pantalla Principal - Estudio Sermiteop</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #050508;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
        }
        /* Contenedor superior para el QR informativo */
        #barra-conexion {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #12131c;
            padding: 10px 25px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 2px solid #222536;
        }
        #contenedor-qr {
            background: white;
            padding: 5px;
            border-radius: 4px;
            display: inline-block;
        }
        #contenedor-qr img { display: block; }
        
        #contenedor-pantalla {
            position: relative;
            width: 850px;
            height: 540px;
            border: 3px solid #333;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            border-radius: 9px;
        }
    </style>
</head>
<body>

    <div id="barra-conexion">
        <div id="contenedor-qr"></div>
        <div>
            <div style="font-size: 18px; font-weight: bold; color: #ff4757;">ESTUDIO SERMITEOP</div>
            <div style="font-size: 14px; color: #aaa; margin-top: 3px;">Escanea para conectar tu control</div>
            <div style="font-size: 12px; color: #ffd32a; font-weight: bold; margin-top: 2px;">Sala: <span id="lbl-sala-id">---</span></div>
        </div>
    </div>

    <div id="contenedor-pantalla">
        <iframe id="iframeJuego" src=""></iframe>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // CONFIGURACIÓN DE TU CONFIG DE FIREBASE (Usa tus datos reales)
        const firebaseConfig = {
            apiKey: "AIzaSyD-Xgn8F9weuNtZ7ICMVMUBdch2S2DIx_I",
            authDomain: "juegosremotos-4f2f8.firebaseapp.com",
            databaseURL: "https://juegosremotos-4f2f8-default-rtdb.firebaseio.com",
            projectId: "juegosremotos-4f2f8",
            storageBucket: "juegosremotos-4f2f8.firebasestorage.app",
            messagingSenderId: "436753419918",
            appId: "1:436753419918:web:6d813e412a3e344fca43df"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const parametros = new URLSearchParams(window.location.search);
        const idSala = parametros.get("sala") || "sala_test";
        const juegoSeleccionado = parametros.get("juego") || "palabra_oculta";

        document.getElementById("lbl-sala-id").innerText = idSala.toUpperCase();
        const iframeJuego = document.getElementById("iframeJuego");
        
        // Cargar juego en el iframe
        iframeJuego.src = `juegos/${juegoSeleccionado}.html`;

        // GENERAR QR UNIVERSAL DESDE PANTALLA.HTML
        function generarQRUniversal() {
            // Construye la URL hacia control.html de forma automática y precisa
            const urlControl = window.location.href.split('?')[0].replace("pantalla.html", "control.html") + `?sala=${idSala}`;
            
            document.getElementById("contenedor-qr").innerHTML = "";
            new QRCode(document.getElementById("contenedor-qr"), {
                text: urlControl,
                width: 130, // Un tamaño más compacto para la barra superior
                height: 130,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }
        
        // Ejecutar QR al cargar
        generarQRUniversal();

        // --- ESCUCHAR CONTROLES DESDE FIREBASE Y MANDARLOS AL IFRAME ---
        db.ref(`sesiones/${idSala}/comandos`).on("child_added", (snapshot) => {
            const datosComando = snapshot.val();
            if (!datosComando) return;

            iframeJuego.contentWindow.postMessage(datosComando, "*");
            snapshot.ref.remove();
        });

        // --- ESCUCHAR ORDENES DEL JUEGO (IFRAME) Y ESCRIBIRLAS EN FIREBASE ---
        window.addEventListener("message", (evento) => {
            const datosJuego = evento.data;
            if (!datosJuego || !datosJuego.accion) return;

            if (datosJuego.accion === "CONFIGURAR_CONTROL_JUEGO") {
                db.ref(`sesiones/${idSala}/jugadores/${datosJuego.idControlador}`).set({
                    numeroJugador: datosJuego.numeroJugador,
                    rol: datosJuego.datos.rol,
                    palabra: datosJuego.datos.palabra || "",
                    opciones: datosJuego.datos.opciones,
                    estadoPanel: "ELEGIR_PISTA"
                });
            }

            if (datosJuego.accion === "ACTIVAR_TURNO_CELULAR") {
                db.ref(`sesiones/${idSala}/jugadores/${datosJuego.idControlador}/miTurno`).set(true);
            }

            if (datosJuego.accion === "MOSTRAR_BOTONES_VOTO_CELULAR") {
                db.ref(`sesiones/${idSala}/jugadores/${datosJuego.idControlador}`).update({
                    estadoPanel: "VOTACION",
                    opcionesVoto: datosJuego.opcionesVoto
                });
            }
        });
    </script>
</body>
</html>
