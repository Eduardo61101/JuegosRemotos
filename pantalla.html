<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pantalla del Juego</title>
    <!-- Librerías necesarias: Generador de QR y Firebase V8 -->
    <script src="https://cloudflare.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; background: #141414; color: white; margin: 0; padding: 20px; }
        h1 { color: #E50914; }
        #contenedor-qr { background: white; padding: 15px; display: inline-block; border-radius: 10px; margin: 10px; }
        #contenedor-qr p { color: black; margin: 0 0 10px 0; font-weight: bold; }
        #canvas { background: #000; border: 3px solid #333; display: block; margin: 20px auto; border-radius: 8px; }
        #estado { font-weight: bold; color: #ffc107; }
    </style>
</head>
<body>

    <h1>Netflix Games - Pantalla Principal</h1>
    
    <div id="contenedor-qr">
        <p>Escanea con tu celular</p>
        <div id="qrcode"></div>
    </div>
    
    <p id="estado">Esperando control remoto...</p>
    <canvas id="canvas" width="400" height="400"></canvas>

    <script>
        // 1. CONFIGURACIÓN DE TU REALTIME DATABASE
        const firebaseConfig = {
            databaseURL: "https://juegosremotos-4f2f8-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. CREAR ID DE SESIÓN ÚNICO
        const sessionId = "sala_" + Math.floor(Math.random() * 90000 + 10000);

        // 3. GENERAR EL CÓDIGO QR DIRECTO A TU CONTROL
        const urlControl = "https://github.io" + sessionId;
        new QRCode(document.getElementById("qrcode"), {
            text: urlControl,
            width: 160,
            height: 160
        });

        // 4. LÓGICA DEL JUEGO (Lienzo y Personaje)
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        let posX = 180;
        let posY = 180;

        function dibujar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#E50914"; // Cuadro rojo estilo Netflix
            ctx.fillRect(posX, posY, 40, 40);
        }
        dibujar();

        // 5. ESCUCHAR LOS COMANDOS DESDE TU FIREBASE
        db.ref("sesiones/" + sessionId).on("value", (snapshot) => {
            const datos = snapshot.val();
            if (datos && datos.accion) {
                document.getElementById("estado").innerHTML = "¡Control conectado y enviando órdenes! 🎮";
                document.getElementById("estado").style.color = "#2ed573";

                if (datos.accion === "ARRIBA" && posY > 0) posY -= 20;
                if (datos.accion === "ABAJO" && posY < canvas.height - 40) posY += 20;
                if (datos.accion === "IZQUIERDA" && posX > 0) posX -= 20;
                if (datos.accion === "DERECHA" && posX < canvas.width - 40) posX += 20;
                
                dibujar();
            }
        });
    </script>
</body>
</html>
