<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cyber Tanks Multiplayer - Netflix Games</title>
    <style>
        body {
            margin: 0;
            background: #0a0a12;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #lobby-info {
            font-size: 18px;
            margin-bottom: 10px;
            font-weight: bold;
            color: #8e9bb0;
            letter-spacing: 1px;
        }
        #juegoCanvas {
            border: 4px solid #333;
            background: #11121c;
            box-shadow: 0 0 35px rgba(0, 0, 0, 0.8);
            border-radius: 6px;
        }
        #pantalla-espera {
            position: absolute;
            background: rgba(10, 10, 18, 0.95);
            width: 800px;
            height: 550px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 6px;
            border: 4px solid #E50914;
            text-align: center;
            z-index: 10;
        }
        .btn-iniciar {
            background: #2ed573;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 0 15px rgba(46, 213, 115, 0.4);
        }
        .lista-jugadores {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .slot-jugador {
            padding: 10px 20px;
            background: #1f2030;
            border-radius: 4px;
            border: 2px dashed #444;
            font-size: 16px;
            color: #666;
        }
        .slot-jugador.activo {
            border-style: solid;
            box-shadow: 0 0 10px rgba(255,255,255,0.1);
        }
        #contador-status {
            margin-top: 15px;
            font-size: 16px;
            color: #ffd32a;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="lobby-info">SALA MULTIJUGADOR LOCAL (MIN. 2 JUGADORES)</div>
    
    <div id="pantalla-espera">
        <h1 style="color: #E50914; font-size: 36px; margin: 0 0 10px 0;">CYBER TANKS</h1>
        <p style="font-size: 18px; color: #aaa;">Conecta tus controles escaneando el código QR</p>
        
        <div class="lista-jugadores">
            <div id="slot1" class="slot-jugador">P1: Esperando...</div>
            <div id="slot2" class="slot-jugador">P2: Esperando...</div>
            <div id="slot3" class="slot-jugador">P3: Esperando...</div>
            <div id="slot4" class="slot-jugador">P4: Esperando...</div>
        </div>

        <div id="contador-status">Esperando que se unan al menos 2 jugadores...</div>

        <button id="btnEmpezar" class="btn-iniciar" style="display:none;" onclick="comenzarBatalla()">
            ¡INICIAR BATALLA!
        </button>
    </div>

    <canvas id="juegoCanvas" width="800" height="550"></canvas>

    <script>
        const canvas = document.getElementById("juegoCanvas");
        const ctx = canvas.getContext("2d");

        let partidaIniciada = false;
        let listaControlesConectados = {}; 
        let numJugadores = 0;

        const infoDiseno = {
            1: { color: "#E50914", nombre: "Jugador 1 (Rojo)", slot: "slot1" },
            2: { color: "#2ed573", nombre: "Jugador 2 (Verde)", slot: "slot2" },
            3: { color: "#1e90ff", nombre: "Jugador 3 (Azul)", slot: "slot3" },
            4: { color: "#ffa500", nombre: "Jugador 4 (Naranja)", slot: "slot4" }
        };

        let tanques = {};
        let balas = [];
        let minas = [];
        let bucleJuego;
        let intervaloEnemigos;

        function registrarControlador(idMando) {
            // Si el control ya está registrado, devolvemos su número asignado
            if (listaControlesConectados[idMando]) return listaControlesConectados[idMando]; 
            
            // Límite máximo de 4 controles
            if (numJugadores >= 4) return null; 

            numJugadores++;
            listaControlesConectados[idMando] = numJugadores;

            // Inicializar tanque
            tanques[numJugadores] = {
                x: 100 + (numJugadores * 120),
                y: 150 + Math.random() * 200,
                w: 36, h: 36,
                vX: 0, vY: 0,
                angulo: 0,
                velocidadBase: 3,
                escudoActivo: false,
                tiempoEscudo: 0,
                recargaHabilidad: 0,
                vida: 100,
                color: infoDiseno[numJugadores].color,
                nombre: "P" + numJugadores
            };

            // Activar visualmente en el Lobby
            const slot = document.getElementById(infoDiseno[numJugadores].slot);
            slot.innerText = infoDiseno[numJugadores].nombre;
            slot.classList.add("activo");
            slot.style.borderColor = infoDiseno[numJugadores].color;
            slot.style.color = infoDiseno[numJugadores].color;

            // RESTRICCIÓN DE JUGADORES: Solo activa el botón si hay 2, 3 o 4 jugadores
            const statusTexto = document.getElementById("contador-status");
            if (numJugadores >= 2) {
                statusTexto.innerText = `¡Listo! ${numJugadores} jugadores conectados.`;
                statusTexto.style.color = "#2ed573";
                document.getElementById("btnEmpezar").style.display = "block";
            } else {
                statusTexto.innerText = `Controles conectados: ${numJugadores}/4. Se requieren mínimo 2 jugadores.`;
                document.getElementById("btnEmpezar").style.display = "none";
            }

            return numJugadores;
        }

        function comenzarBatalla() {
            if (numJugadores < 2) return; // Validación extra de seguridad
            document.getElementById("pantalla-espera").style.display = "none";
            partidaIniciada = true;
            bucleJuego = setInterval(actualizarMundo, 1000 / 60);
        }

        // RECEPTOR DE FIREBASE REAL (Identifica mandos de forma individual)
        window.addEventListener("message", (evento) => {
            const datos = evento.data;
            if (!datos || !datos.accion) return;

            // Tomamos el idDispositivo o remitente único enviado desde tu pantalla.html
            const idMandoUnico = datos.idControlador || datos.idDispositivo || "dispositivo_id_" + (datos.jugadorPrefijo || "anonimo");
            
            // Registra el control dinámicamente
            const nJugador = registrarControlador(idMandoUnico);
            if (!nJugador || !partidaIniciada) return;

            const tanque = tanques[nJugador];
            if (!tanque || tanque.vida <= 0) return;

            switch (datos.accion) {
                // Movimientos
                case "IZQUIERDA": tanque.vX = -tanque.velocidadBase; tanque.angulo = Math.PI; break;
                case "DERECHA": tanque.vX = tanque.velocidadBase; tanque.angulo = 0; break;
                case "ARRIBA": tanque.vY = -tanque.velocidadBase; tanque.angulo = -Math.PI / 2; break;
                case "ABAJO": tanque.vY = tanque.velocidadBase; tanque.angulo = Math.PI / 2; break;
                case "CENTRO": tanque.vX = 0; tanque.vY = 0; break;

                // Acciones de Botones Completa
                case "A": // Disparo Cañón Láser
                    balas.push({
                        x: tanque.x + Math.cos(tanque.angulo) * 20, 
                        y: tanque.y + Math.sin(tanque.angulo) * 20,
                        vX: Math.cos(tanque.angulo) * 6.5,
                        vY: Math.sin(tanque.angulo) * 6.5,
                        dueno: nJugador
                    });
                    break;

                case "B": // Escudo Temporal
                    if (!tanque.escudoActivo && tanque.recargaHabilidad <= 0) {
                        tanque.escudoActivo = true;
                        tanque.tiempoEscudo = 150; // 2.5 segundos activos
                    }
                    break;

                case "X": // Soltar Mina
                    minas.push({ x: tanque.x, y: tanque.y, dueno: nJugador });
                    break;

                case "Y": // Propulsor / Nitro
                    tanque.x += Math.cos(tanque.angulo) * 35;
                    tanque.y += Math.sin(tanque.angulo) * 35;
                    break;
            }
        });

        function actualizarMundo() {
            // Actualizar Física Tanques
            for (let id in tanques) {
                let t = tanques[id];
                if (t.vida <= 0) continue;

                t.x += t.vX;
                t.y += t.vY;

                if (t.x < 25) t.x = 25; if (t.x > canvas.width - 25) t.x = canvas.width - 25;
                if (t.y < 25) t.y = 25; if (t.y > canvas.height - 25) t.y = canvas.height - 25;

                if (t.escudoActivo) {
                    t.tiempoEscudo--;
                    if (t.tiempoEscudo <= 0) {
                        t.escudoActivo = false;
                        t.recargaHabilidad = 240; // Cooldown
                    }
                }
                if (t.recargaHabilidad > 0) t.recargaHabilidad--;
            }

            // Actualizar Balas
            balas.forEach((b, bIdx) => {
                b.x += b.vX; b.y += b.vY;
                
                for (let id in tanques) {
                    let t = tanques[id];
                    if (t.vida <= 0 || id == b.dueno) continue;

                    let dist = Math.hypot(b.x - t.x, b.y - t.y);
                    if (dist < t.w / 2 + 4) {
                        balas.splice(bIdx, 1);
                        if (!t.escudoActivo) t.vida -= 20;
                        return;
                    }
                }

                if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                    balas.splice(bIdx, 1);
                }
            });

            // Actualizar Minas
            minas.forEach((m, mIdx) => {
                for (let id in tanques) {
                    let t = tanques[id];
                    if (t.vida <= 0 || id == m.dueno) continue;

                    let dist = Math.hypot(m.x - t.x, m.y - t.y);
                    if (dist < t.w / 2 + 12) {
                        minas.splice(mIdx, 1);
                        if (!t.escudoActivo) t.vida -= 40; // Impacto crítico
                        return;
                    }
                }
            });

            renderizarTodo();
        }

        function renderizarTodo() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dibujar Arena de Batalla (Fondo Tecnológico)
            ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
            ctx.lineWidth = 1;
            for(let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let j = 0; j < canvas.height; j += 40) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke();
            }

            // Dibujar Minas (Discos rosas parpadeantes)
            minas.forEach(m => {
                ctx.fillStyle = "#ff007f";
                ctx.beginPath(); ctx.arc(m.x, m.y, 9, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2; ctx.stroke();
            });

            // Dibujar Balas Láser (Esferas de Energía)
            balas.forEach(b => {
                ctx.fillStyle = "#00ffff";
                ctx.shadowColor = "#00ffff"; ctx.shadowBlur = 8;
                ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
            });

            // Dibujar Tanques
            for (let id in tanques) {
                let t = tanques[id];
                if (t.vida <= 0) continue;

                ctx.save();
                ctx.translate(t.x, t.y);
                ctx.rotate(t.angulo);

                // Cuerpo Tanque
                ctx.fillStyle = t.color;
                ctx.fillRect(-t.w / 2, -t.h / 2, t.w, t.h);

                // Orugas de movimiento
                ctx.fillStyle = "#25262e";
                ctx.fillRect(-t.w/2 - 3, -t.h/2 - 2, 6, t.h + 4);
                ctx.fillRect(t.w/2 - 3, -t.h/2 - 2, 6, t.h + 4);

                // Cañón Láser
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, -4, t.w / 2 + 10, 8);

                // Escudo protector Neón
                if (t.escudoActivo) {
                    ctx.strokeStyle = "#48dbfb";
                    ctx.shadowColor = "#48dbfb"; ctx.shadowBlur = 12;
                    ctx.lineWidth = 4;
                    ctx.beginPath(); ctx.arc(0, 0, t.w - 2, 0, Math.PI * 2); ctx.stroke();
                    ctx.shadowBlur = 0;
                }

                ctx.restore();

                // HUD Vida encima de los tanques
                ctx.fillStyle = "rgba(0,0,0,0.6)";
                ctx.fillRect(t.x - 22, t.y - 30, 44, 6);
                ctx.fillStyle = t.vida > 35 ? "#2ed573" : "#ff4757";
                ctx.fillRect(t.x - 22, t.y - 30, (t.vida / 100) * 44, 6);
                
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 11px Arial";
                ctx.fillText(t.nombre, t.x - 7, t.y - 38);
            }

            // Comprobar Fin de Partida (Si queda solo uno en pie)
            let vivos = Object.values(tanques).filter(t => t.vida > 0);
            if (vivos.length <= 1 && partidaIniciada) {
                partidaIniciada = false;
                clearInterval(bucleJuego);
                
                let ganadorTexto = vivos.length === 1 ? `¡GANADOR: ${vivos[0].nombre}!` : "¡EMPATE TOTAL!";
                
                setTimeout(() => {
                    document.getElementById("pantalla-espera").style.display = "flex";
                    document.getElementById("contador-status").innerText = "La batalla ha terminado.";
                    document.getElementById("contador-status").style.color = "#ffd32a";
                    
                    // Resetear variables para permitir revancha limpia
                    listaControlesConectados = {};
                    numJugadores = 0;
                    tanques = {};
                    balas = [];
                    minas = [];
                    
                    // Limpiar slots visuales
                    for(let i=1; i<=4; i++) {
                        let s = document.getElementById("slot"+i);
                        s.innerText = `P${i}: Esperando...`;
                        s.className = "slot-jugador";
                        s.style = "";
                    }
                    document.getElementById("btnEmpezar").style.display = "none";
                }, 2000);
            }
        }
    </script>
</body>
</html>
